apiVersion: apps/v1
kind: Deployment
metadata:
  name: plinfra-app
  labels:
    app: plinfra-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: plinfra-app
  template:
    metadata:
      labels:
        app: plinfra-app
    spec:
      containers:
        - name: app
          image: REGISTRY/plinfra-app:TAG
          ports:
            - containerPort: 8000
          env:
            - name: ENVIRONMENT
              value: "ENV_NAME"
            - name: APP_VERSION
              value: "TAG"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10