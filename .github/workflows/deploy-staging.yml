name: Deploy to Staging

on:
  push:
    branches: [staging]

env:
  PROJECT_NAME: plinfra
  ENVIRONMENT: staging
  LOCATION: australiaeast

jobs:

  terraform:
    name: Provision staging infrastructure
    runs-on: ubuntu-latest
    environment: staging
    outputs:
      acr_login_server: ${{ steps.tf_output.outputs.acr_login_server }}
      aks_cluster_name: ${{ steps.tf_output.outputs.aks_cluster_name }}
      resource_group: ${{ steps.tf_output.outputs.resource_group }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_wrapper: false

      - name: Terraform init
        working-directory: infra/terraform
        run: |
          terraform init \
            -backend-config="key=staging/terraform.tfstate"

      - name: Terraform apply
        working-directory: infra/terraform
        run: |
          terraform apply \
            -var-file="envs/staging.tfvars" \
            -var="subscription_id=${{ secrets.AZURE_SUBSCRIPTION_ID }}" \
            -auto-approve

      - name: Get Terraform outputs
        id: tf_output
        working-directory: infra/terraform
        run: |
          echo "acr_login_server=$(terraform output -raw acr_login_server)" >> $GITHUB_OUTPUT
          echo "aks_cluster_name=$(terraform output -raw aks_cluster_name)" >> $GITHUB_OUTPUT
          echo "resource_group=$(terraform output -raw resource_group_name)" >> $GITHUB_OUTPUT

  build-and-deploy:
    name: Build and deploy to staging
    runs-on: ubuntu-latest
    needs: terraform
    environment: staging
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to ACR
        run: az acr login --name ${{ env.PROJECT_NAME }}${{ env.ENVIRONMENT }}acr

      - name: Build and push image
        run: |
          docker build \
            --platform linux/amd64 \
            -t ${{ needs.terraform.outputs.acr_login_server }}/plinfra-app:${{ github.sha }} \
            -t ${{ needs.terraform.outputs.acr_login_server }}/plinfra-app:latest \
            ./app

          docker push ${{ needs.terraform.outputs.acr_login_server }}/plinfra-app:${{ github.sha }}
          docker push ${{ needs.terraform.outputs.acr_login_server }}/plinfra-app:latest

      - name: Get AKS credentials
        run: |
          az aks get-credentials \
            --resource-group ${{ needs.terraform.outputs.resource_group }} \
            --name ${{ needs.terraform.outputs.aks_cluster_name }}

      - name: Deploy to AKS
        run: |
          sed -e "s|REGISTRY/plinfra-app:TAG|${{ needs.terraform.outputs.acr_login_server }}/plinfra-app:${{ github.sha }}|g" \
              -e "s|ENV_NAME|${{ env.ENVIRONMENT }}|g" \
              -e "s|TAG|${{ github.sha }}|g" \
              k8s/deployment.yaml | kubectl apply -f -

          kubectl apply -f k8s/service.yaml
          kubectl rollout status deployment/plinfra-app --timeout=120s

      - name: Get service URL
        run: |
          echo "Waiting for LoadBalancer IP..."
          sleep 30
          kubectl get service plinfra-app-svc